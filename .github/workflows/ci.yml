name: CI

on:
  pull_request:
  push:
    branches: [master]
    tags: ["v*"]
  workflow_dispatch:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write   # release job needs this to attach assets

jobs:
  verify:
    name: Typecheck + Test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

  build:
    name: Build bundle
    # Build on every CI run so we catch bundle regressions early, and so the
    # artifact is available for the release job on tag pushes.
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify bundle is self-contained
        run: |
          set -euo pipefail
          # The esbuild bundle must not retain any bare/package imports —
          # OMP loads it from the plugin set without a resolver.
          leak=$(grep -oE 'from "[^"]+"' dist/index.js \
            | grep -vE '"(node:)?(fs|path|os|crypto|child_process|stream|events|util|url|buffer|http|https|net|tls|zlib|string_decoder|tty|dns|worker_threads|async_hooks|perf_hooks|inspector|v8|vm|timers|assert|readline|module|process|querystring)"' \
            | sort -u || true)
          if [ -n "$leak" ]; then
            echo "::error::Bundle contains non-builtin imports (would break plugin load):"
            echo "$leak"
            exit 1
          fi
          echo "OK: bundle is self-contained"

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v5
        with:
          name: dist-bundle
          path: dist/index.js
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish bundle to release
    # Only on version tags. Belt-and-suspenders with the committed dist bundle:
    # CI is the source of truth for the build; the committed bundle keeps
    # `omp install github:...#tag` working without an asset fetch.
    # Release notes are extracted from the hand-written docs/CHANGELOG.md.
    needs: [verify, build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - name: Download bundle artifact
        uses: actions/download-artifact@v5
        with:
          name: dist-bundle
          path: dist

      - name: Extract release notes from docs/CHANGELOG.md
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # VERSION is the tag name with the leading 'v' stripped (v0.3.1 -> 0.3.1)
          export VERSION="${VERSION#v}"
          node <<'NODESCRIPT'
            const fs = require("fs");
            const version = process.env.VERSION;
            const src = fs.readFileSync("docs/CHANGELOG.md", "utf8");
            const lines = src.split(/\r?\n/);
            const header = "## [" + version + "]";
            const start = lines.findIndex(l => l.startsWith(header));
            if (start === -1) {
              console.error('::error::No "## [' + version + ']" section found in docs/CHANGELOG.md');
              process.exit(1);
            }
            const body = [];
            for (let i = start + 1; i < lines.length; i++) {
              if (lines[i].startsWith("## ")) break;
              body.push(lines[i]);
            }
            const trimmed = body.join("\n").replace(/^\n+|\n+$/g, "");
            if (!trimmed) {
              console.error("::error::CHANGELOG section for " + version + " is empty");
              process.exit(1);
            }
            fs.writeFileSync("release-notes.md", trimmed);
            console.log("Extracted " + trimmed.length + " chars of release notes for " + version);
          NODESCRIPT
          echo "--- notes preview ---"
          cat release-notes.md

      - name: Create or update release with notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${{ github.ref_name }}"
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$tag" --repo "$GITHUB_REPOSITORY" --notes-file release-notes.md
          else
            gh release create "$tag" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$tag" \
              --notes-file release-notes.md \
              --latest
          fi
          gh release upload "$tag" dist/index.js --clobber --repo "$GITHUB_REPOSITORY"
          echo "Published hand-written notes + bundle to $tag"
